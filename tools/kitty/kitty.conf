enable_audio_bell no

include color.ini

font_family      HackNerdFont
font_size 10

disable_ligatures never

url_color #61afef

url_style curly

# Moverse entre splits (Super+HJKL)
map super+h neighboring_window left
map super+l neighboring_window right
map super+k neighboring_window up
map super+j neighboring_window down

# Moverse entre splits (Super+Arrows)
map super+left  neighboring_window left
map super+right neighboring_window right
map super+up    neighboring_window up
map super+down  neighboring_window down

# Crear splits
map f5 launch --location=hsplit --cwd=current
map f6 launch --location=vsplit --cwd=current

# Resize splits (pulsa varias veces para ajustar)
map ctrl+shift+left resize_window narrower 3
map ctrl+shift+right resize_window wider 3
map ctrl+shift+up resize_window taller 3
map ctrl+shift+down resize_window shorter 3

# Modo resize interactivo: F7 para entrar, flechas para resize, Esc para salir
map f7 start_resizing_window

map f1 copy_to_buffer a
map f2 paste_from_buffer a
map f3 copy_to_buffer b
map f4 paste_from_buffer b

map ctrl+shift+z toggle_layout stack
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd

cursor_shape beam
cursor_beam_thickness 1.8

mouse_hide_wait 3.0
detect_urls yes

repaint_delay 10
input_delay 3
sync_to_monitor yes

tab_bar_style powerline

inactive_tab_background #e06c75
inactive_tab_foreground #000000
active_tab_background #98c379
tar_bar_margin_color black



background_opacity 0.90

shell zsh
